<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotización de Pantallas - CELULARES JOSEDAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* --- ESTILOS (Puedes copiar los mismos de tu otra página para mantener la unidad) --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #14181c;
      padding: 16px;
    }
    .card {
      background: rgba(24, 30, 36, 0.9);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 28px;
      padding: 30px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    h1 { color: #e8f0f8; margin-bottom: 8px; }
    .subtitle { color: #8a9aa8; margin-bottom: 24px; }
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .search-box input {
      flex: 1;
      min-height: 54px;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(16, 22, 28, 0.7);
      color: #e8f0f8;
      font-size: 1rem;
      outline: none;
    }
    .search-box input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.15);
    }
    .search-box button {
      min-height: 54px;
      padding: 0 24px;
      border-radius: 16px;
      border: 0;
      background: linear-gradient(135deg, #00e5ff, #0091b0);
      color: #0a0e12;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .search-box button:hover { transform: scale(1.02); }
    .results-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .result-item {
      background: rgba(32, 40, 48, 0.4);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      animation: fadeSlideUp 0.3s ease forwards;
    }
    .result-item .info { display: flex; flex-direction: column; }
    .result-item .modelo { color: #e8f0f8; font-weight: 600; font-size: 1.1rem; }
    .result-item .calidad { color: #8a9aa8; font-size: 0.9rem; }
    .result-item .precio { color: #00e5ff; font-weight: 800; font-size: 1.3rem; }
    .no-results { color: #8a9aa8; text-align: center; padding: 30px 0; }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .helper { color: #6a7a88; margin-top: 12px; font-size: 0.9rem; }
    @media (max-width: 600px) {
      .card { padding: 20px; }
      .search-box input, .search-box button { width: 100%; }
      .result-item { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>💰 Cotización de Pantallas</h1>
    <p class="subtitle">Ingresa el modelo de tu celular para conocer el precio de su pantalla.</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Ej: Samsung S24, iPhone 15, Xiaomi..." />
      <button id="searchBtn">Buscar</button>
    </div>

    <div id="results" class="results-container">
      <!-- Aquí se mostrarán los resultados -->
      <p class="helper">🔍 Escribe un modelo para comenzar la búsqueda.</p>
    </div>
  </div>

  <script>
    // --- CONFIGURACIÓN ---
    // La URL de tu archivo JSON con los precios
    const PRICES_JSON_URL = 'prices.json';

    // --- ELEMENTOS DEL DOM ---
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsContainer = document.getElementById('results');

    // --- VARIABLE GLOBAL PARA LOS DATOS ---
    let pricesData = [];

    // --- 1. CARGAR LOS DATOS ---
    async function loadPrices() {
      try {
        // Añadimos un parámetro 't' para evitar la caché del navegador
        const url = PRICES_JSON_URL + '?t=' + new Date().getTime();
        const response = await fetch(url);
        if (!response.ok) throw new Error('No se pudo cargar la lista de precios.');
        pricesData = await response.json();
        // Mostrar un mensaje de éxito o simplemente preparar la interfaz
        resultsContainer.innerHTML = `<p class="helper">✅ Listo. Busca el modelo de tu celular.</p>`;
      } catch (error) {
        console.error('Error al cargar precios:', error);
        resultsContainer.innerHTML = `<p class="helper" style="color: #ff1744;">❌ Error al cargar los precios. Intenta de nuevo más tarde.</p>`;
      }
    }

    // --- 2. FUNCIÓN DE BÚSQUEDA ---
    function performSearch() {
      const query = searchInput.value.trim().toLowerCase();
      // Si la consulta está vacía, mostramos un mensaje y no hacemos nada
      if (!query) {
        resultsContainer.innerHTML = `<p class="helper">🔍 Escribe un modelo para comenzar la búsqueda.</p>`;
        return;
      }

      // Buscar en los datos (filtro insensible a mayúsculas/minúsculas)
      const results = pricesData.filter(item =>
        item.modelo.toLowerCase().includes(query) ||
        item.marca.toLowerCase().includes(query)
      );

      // --- 3. MOSTRAR LOS RESULTADOS ---
      if (results.length === 0) {
        resultsContainer.innerHTML = `<div class="no-results">😕 No encontramos pantallas para "<strong>${searchInput.value}</strong>". Prueba con otro modelo.</div>`;
        return;
      }

      // Generar el HTML para cada resultado
      let html = '';
      results.forEach(item => {
        html += `
          <div class="result-item">
            <div class="info">
              <span class="modelo">${item.marca} ${item.modelo}</span>
              <span class="calidad">Calidad: ${item.calidad}</span>
            </div>
            <span class="precio">$${item.precio.toLocaleString('es-CO')}</span>
          </div>
        `;
      });

      resultsContainer.innerHTML = html;
    }

    // --- 4. EVENTOS Y CARGA INICIAL ---
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    // Cargar los datos al iniciar la página
    loadPrices();
  </script>
</body>
</html>
