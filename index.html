<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Cotización de Pantallas - CELULARES JOSEDAN</title>
  <meta name="description" content="Consulta el precio de la pantalla de tu celular por modelo." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      background: #14181c;
      padding: 16px;
      margin: 0;
    }
    .card {
      background: rgba(24, 30, 36, 0.9);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 229, 255, 0.20);
      border-radius: 28px;
      padding: 30px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    .card h1 {
      color: #e8f0f8;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: #8a9aa8;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .search-box input {
      flex: 1;
      min-height: 54px;
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(16, 22, 28, 0.7);
      color: #e8f0f8;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.15);
    }
    .search-box input::placeholder {
      color: #6a7a88;
    }
    .search-box button {
      min-height: 54px;
      padding: 0 24px;
      border-radius: 16px;
      border: 0;
      background: linear-gradient(135deg, #00e5ff, #0091b0);
      color: #0a0e12;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }
    .search-box button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
    }
    .search-box button:active {
      transform: scale(0.97);
    }
    .results-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100px;
    }
    .result-item {
      background: rgba(32, 40, 48, 0.4);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      animation: fadeSlideUp 0.3s ease forwards;
    }
    .result-item .info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .result-item .modelo {
      color: #e8f0f8;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .result-item .calidad {
      color: #8a9aa8;
      font-size: 0.9rem;
    }
    .result-item .precio {
      color: #00e5ff;
      font-weight: 800;
      font-size: 1.3rem;
      background: rgba(0, 229, 255, 0.08);
      padding: 6px 14px;
      border-radius: 40px;
      border: 1px solid rgba(0, 229, 255, 0.15);
    }
    .no-results {
      color: #8a9aa8;
      text-align: center;
      padding: 30px 0;
      font-size: 1.05rem;
    }
    .no-results strong {
      color: #e8f0f8;
    }
    .helper {
      color: #6a7a88;
      margin-top: 12px;
      font-size: 0.9rem;
      text-align: center;
    }
    .helper .emoji {
      margin-right: 6px;
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      .card { padding: 20px; }
      .search-box input, .search-box button { width: 100%; }
      .result-item { flex-direction: column; align-items: flex-start; gap: 10px; }
      .result-item .precio { align-self: flex-start; }
    }
    @media (max-width: 400px) {
      .card { padding: 16px; }
      .search-box input { padding: 12px 14px; min-height: 46px; }
      .search-box button { min-height: 46px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>💰 Cotización de Pantallas</h1>
    <p class="subtitle">Ingresa el modelo de tu celular para conocer el precio de su pantalla.</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Ej: Samsung A12, Redmi 13c, Moto G60..." autocomplete="off" />
      <button id="searchBtn">Buscar</button>
    </div>

    <div id="results" class="results-container">
      <p class="helper"><span class="emoji">🔍</span> Escribe un modelo para comenzar la búsqueda.</p>
    </div>
  </div>

  <script>
    // ---------- CONFIGURACIÓN ----------
    const PRICES_JSON_URL = 'prices.json';

    // ---------- ALIAS PARA NORMALIZAR BÚSQUEDAS ----------
    const ALIAS_MAP = {
      'redmi': 'xiaomi',
      'galaxy': 'samsung',
      'moto': 'motorola',
      'huawei': 'huawei',
      'honor': 'honor',
      'xiaomi': 'xiaomi',
      'samsung': 'samsung',
      'motorola': 'motorola'
    };

    // ---------- ELEMENTOS DOM ----------
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsContainer = document.getElementById('results');

    // ---------- VARIABLE GLOBAL ----------
    let pricesData = [];

    // ---------- FUNCIÓN PARA NORMALIZAR LA CONSULTA ----------
    function normalizeQuery(query) {
      let q = query.toLowerCase().trim();
      // Dividir por espacios
      const words = q.split(/\s+/);
      if (words.length > 0) {
        const firstWord = words[0];
        // Si la primera palabra es un alias conocido, reemplazarla por la marca oficial
        if (ALIAS_MAP[firstWord]) {
          words[0] = ALIAS_MAP[firstWord];
          q = words.join(' ');
        }
      }
      return q;
    }

    // ---------- CARGAR DATOS DESDE JSON ----------
    async function loadPrices() {
      try {
        // Añadir timestamp para evitar caché
        const url = PRICES_JSON_URL + '?t=' + new Date().getTime();
        const response = await fetch(url);
        if (!response.ok) throw new Error('No se pudo cargar la lista de precios.');
        const data = await response.json();
        // Crear campo 'searchable' con marca + modelo en minúsculas
        pricesData = data.map(item => ({
          ...item,
          searchable: (item.marca + ' ' + item.modelo).toLowerCase()
        }));
        resultsContainer.innerHTML = `<p class="helper"><span class="emoji">✅</span> Listo. Busca el modelo de tu celular.</p>`;
      } catch (error) {
        console.error('Error al cargar precios:', error);
        resultsContainer.innerHTML = `<p class="helper" style="color: #ff1744;">❌ Error al cargar los precios. Intenta de nuevo más tarde.</p>`;
      }
    }

    // ---------- FUNCIÓN DE BÚSQUEDA ----------
    function performSearch() {
      const query = searchInput.value.trim();
      if (!query) {
        resultsContainer.innerHTML = `<p class="helper"><span class="emoji">🔍</span> Escribe un modelo para comenzar la búsqueda.</p>`;
        return;
      }

      const normalizedQuery = normalizeQuery(query);

      // Buscar en el campo 'searchable' (marca + modelo)
      const results = pricesData.filter(item =>
        item.searchable.includes(normalizedQuery)
      );

      if (results.length === 0) {
        resultsContainer.innerHTML = `
          <div class="no-results">
            😕 No encontramos pantallas para "<strong>${searchInput.value}</strong>".<br/>
            <span style="font-size:0.9rem; color:#6a7a88;">Prueba con otro modelo o revisa la ortografía.</span>
          </div>
        `;
        return;
      }

      // Ordenar resultados (opcional: por precio ascendente)
      results.sort((a, b) => a.precio - b.precio);

      let html = '';
      results.forEach(item => {
        html += `
          <div class="result-item">
            <div class="info">
              <span class="modelo">${item.marca} ${item.modelo}</span>
              <span class="calidad">Calidad: ${item.calidad}</span>
            </div>
            <span class="precio">₡${item.precio.toLocaleString('es-CR')}</span>
          </div>
        `;
      });

      resultsContainer.innerHTML = html;
    }

    // ---------- EVENTOS ----------
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    // ---------- INICIALIZAR ----------
    loadPrices();
  </script>
</body>
</html>
